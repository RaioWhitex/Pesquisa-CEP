<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topo">Preenchimento automático do endereço</header>

  <main class="container">
    <h1 class="titulo">Formulário de Cadastro</h1>

    <div class="grupo">
      <input type="text" id="cep" class="campo" placeholder=" " maxlength="9" />
      <label for="cep">CEP</label>
    </div>

    <div class="grupo">
      <input type="text" id="rua" class="campo" placeholder=" " />
      <label for="rua">Rua</label>
    </div>

    <div class="grupo">
      <input type="text" id="numero" class="campo" placeholder=" " />
      <label for="numero">Número</label>
    </div>

    <div class="grupo">
      <input type="text" id="bairro" class="campo" placeholder=" " />
      <label for="bairro">Bairro</label>
    </div>

    <div class="grupo">
      <input type="text" id="cidade" class="campo" placeholder=" " />
      <label for="cidade">Cidade</label>
    </div>

    <div class="grupo">
      <input type="text" id="estado" class="campo" placeholder=" " />
      <label for="estado">Estado</label>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
